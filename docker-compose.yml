services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: gamesignal
      POSTGRES_USER: gamesignal_app
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  adminer:
    image: adminer
    ports:
      - "8080:8080"
volumes:
  postgres_data:
